apiVersion: batch/v1
kind: Job
metadata:
  name: vault-init-auth
spec:
  template:
    spec:
      serviceAccountName: vault-init
      containers:
        - name: vault-init
          image: hashicorp/vault:1.15.4
          command:
            - /bin/sh
            - -c
            - |
              vault login $Token

              # Enable Kubernetes auth
              vault auth enable kubernetes

              vault policy write api-policy -<<EOF
              path "api/*" {
                capabilities = ["read"]
              }
              EOF

              # Write auth Kubernetes role for chat api
              vault write auth/kubernetes/role/chat-role \
                bound_service_account_names=chat-sa \
                bound_service_account_namespaces=api \
                policies=api-policy \
                ttl=24h
              
              # Write auth Kubernetes role for communication api
              vault write auth/kubernetes/role/communication-role \
                bound_service_account_names=communication-sa \
                bound_service_account_namespaces=api \
                policies=api-policy \
                ttl=24h

              # Write auth Kubernetes role for parser api
              vault write auth/kubernetes/role/parser-role \
                bound_service_account_names=parser-sa \
                bound_service_account_namespaces=api \
                policies=api-policy \
                ttl=24h

              # Write auth Kubernetes role for user api
              vault write auth/kubernetes/role/user-role \
                bound_service_account_names=user-sa \
                bound_service_account_namespaces=api \
                policies=api-policy \
                ttl=24h

              # Write auth Kubernetes role for identity
              vault write auth/kubernetes/role/identity-role \
                bound_service_account_names=identity-sa \
                bound_service_account_namespaces=identity \
                policies=api-policy \
                ttl=24h

              vault policy write app-policy -<<EOF
              path "app/*" {
                capabilities = ["read"]
              }
              EOF

              # Write auth Kubernetes role for web
              vault write auth/kubernetes/role/web-role \
                bound_service_account_names=web-sa \
                bound_service_account_namespaces=web-app \
                policies=api-policy,app-policy \
                ttl=24h
              
              # Write auth Kubernetes role for web
              vault write auth/kubernetes/role/hubs-role \
                bound_service_account_names=hubs-sa \
                bound_service_account_namespaces=web-app \
                policies=api-policy,app-policy \
                ttl=24h
          envFrom:
            - secretRef:
                name: vault-init-secret
      restartPolicy: OnFailure
