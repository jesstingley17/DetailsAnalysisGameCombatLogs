apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-{{ .Values.communication.name }}
  labels:
    app: {{ .Release.Name }}
    env: {{ .Values.env }}
    owner: OlegFedosov
spec:
  replicas: {{ .Values.autoscaling.min }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-{{ .Values.communication.name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-{{ .Values.communication.name }}
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "{{ .Values.communication.vault.role }}"
        vault.hashicorp.com/agent-inject-secret-api: "api/API"
        vault.hashicorp.com/agent-inject-template-api: |
          {{ "{{" }} with secret "api/API/Identity" {{ "}}" }}
          export API__Identity="{{ "{{" }} .Data.data.Identity {{ "}}" }}"
          {{ "{{" }} end{{ "}}" }}
        vault.hashicorp.com/agent-inject-secret-db: "api/DB"
        vault.hashicorp.com/agent-inject-template-db: |
          {{ "{{" }} with secret "api/DB/Communication/DefaultConnection " {{ "}}" }}
          export Database__DefaultConnection="{{ "{{" }} .Data.data.DefaultConnection {{ "}}" }}"
          {{ "{{" }} end{{ "}}" }}
          {{ "{{" }} with secret "api/DB/Communication/FirebaseConnection  " {{ "}}" }}
          export Database__FirebaseConnection="{{ "{{" }} .Data.data.FirebaseConnection  {{ "}}" }}"
          {{ "{{" }} end{{ "}}" }}
          {{ "{{" }} with secret "api/DB/Communication/Name" {{ "}}" }}
          export Database__Name="{{ "{{" }} .Data.data.Name {{ "}}" }}"
          {{ "{{" }} end{{ "}}" }}
        vault.hashicorp.com/agent-inject-secret-authentication: "api/Authentication"
        vault.hashicorp.com/agent-inject-template-authentication: |
          {{ "{{" }} with secret "api/Authentication/Authority" {{ "}}" }}
          export Authentication__Authority="{{ "{{" }} .Data.data.Authority {{ "}}" }}"
          {{ "{{" }} end{{ "}}" }}
          {{ "{{" }} with secret "api/Authentication/Issuer  " {{ "}}" }}
          export Authentication__Issuer="{{ "{{" }} .Data.data.Issuer {{ "}}" }}"
          {{ "{{" }} end{{ "}}" }}
          {{ "{{" }} with secret "api/Authentication/IssuerSigningKey" {{ "}}" }}
          export Authentication__IssuerSigningKey="{{ "{{" }} .Data.data.IssuerSigningKey {{ "}}" }}"
          {{ "{{" }} end{{ "}}" }}
          {{ "{{" }} with secret "api/Authentication/Client/DesktopClientId" {{ "}}" }}
          export Authentication__Client__DesktopClientId="{{ "{{" }} .Data.data.DesktopClientId {{ "}}" }}"
          {{ "{{" }} end{{ "}}" }}
          {{ "{{" }} with secret "api/Authentication/Client/WebClientId   " {{ "}}" }}
          export Authentication__Client__WebClientId="{{ "{{" }} .Data.data.WebClientId  {{ "}}" }}"
          {{ "{{" }} end{{ "}}" }}
          {{ "{{" }} with secret "api/Authentication/Client/Scope " {{ "}}" }}
          export Authentication__Client__Scope="{{ "{{" }} .Data.data.Scope  {{ "}}" }}"
          {{ "{{" }} end{{ "}}" }}
    spec:
      serviceAccountName: {{ .Values.communication.vault.serviceAccountName }}
      containers:
        - name: {{ .Values.communication.container.name }}
          image: {{ .Values.communication.container.image }}:{{ .Values.imageTags.api.communication }}
          command:
            ['sh', '-c']
          args:
            ['. /vault/secrets/api && . /vault/secrets/db && . /vault/secrets/authentication && dotnet CombatAnalysis.CommunicationAPI.dll']
          ports:
            - containerPort: {{ .Values.communication.container.port }}
          env:
           - name: ASPNETCORE_ENVIRONMENT
             value: {{ .Values.env }}