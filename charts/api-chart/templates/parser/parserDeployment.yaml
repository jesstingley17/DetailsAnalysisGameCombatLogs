apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-{{ .Values.parser.name }}
  labels:
    app: {{ .Release.Name }}
    env: {{ .Values.env }}
    owner: OlegFedosov
spec:
  replicas: {{ .Values.autoscaling.min }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-{{ .Values.parser.name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-{{ .Values.parser.name }}
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "{{ .Values.parser.vault.role }}"
        vault.hashicorp.com/agent-inject-secret-db: "api/DB"
        vault.hashicorp.com/agent-inject-template-db: |
          {{ "{{" }} with secret "api/DB/Parser/DefaultConnection " {{ "}}" }}
          export Database__DefaultConnection="{{ "{{" }} .Data.data.DefaultConnection {{ "}}" }}"
          {{ "{{" }} end{{ "}}" }}
          {{ "{{" }} with secret "api/DB/Parser/FirebaseConnection  " {{ "}}" }}
          export Database__FirebaseConnection="{{ "{{" }} .Data.data.FirebaseConnection  {{ "}}" }}"
          {{ "{{" }} end{{ "}}" }}
          {{ "{{" }} with secret "api/DB/Parser/Name" {{ "}}" }}
          export Database__Name="{{ "{{" }} .Data.data.Name {{ "}}" }}"
          {{ "{{" }} end{{ "}}" }}
          {{ "{{" }} with secret "api/DB/Parser/DataProcessingType" {{ "}}" }}
          export Database__DataProcessingType="{{ "{{" }} .Data.data.DataProcessingType {{ "}}" }}"
          {{ "{{" }} end{{ "}}" }}
          {{ "{{" }} with secret "api/DB/Parser/CommandTimeout" {{ "}}" }}
          export DBConfiguration__CommandTimeout="{{ "{{" }} .Data.data.CommandTimeout {{ "}}" }}"
          {{ "{{" }} end{{ "}}" }}
          {{ "{{" }} with secret "api/DB/Parser/MaxRequestBodySize" {{ "}}" }}
          export DBConfiguration__MaxRequestBodySize="{{ "{{" }} .Data.data.MaxRequestBodySize {{ "}}" }}"
          {{ "{{" }} end{{ "}}" }}
    spec:
      serviceAccountName: {{ .Values.parser.vault.serviceAccountName }}
      containers:
        - name: {{ .Values.parser.container.name }}
          image: {{ .Values.parser.container.image }}:{{ .Values.imageTags.api.parser }}
          command:
            ['sh', '-c']
          args:
            ['. /vault/secrets/db && dotnet CombatAnalysis.CombatParserAPI.dll']
          ports:
            - containerPort: {{ .Values.parser.container.port }}
          env:
           - name: ASPNETCORE__ENVIRONMENT
             value: {{ .Values.env }}
           - name: Players_Specs
             value: '{"0":"Удар Плети","1":"Воющий ветер","2":"Полоснуть","3":"Омоложение","4":"Огненная глыба","5":"Божественная буря","6":"Молот праведника","7":"Выстрел химеры","8":"Разрывной выстрел","9":"Расправа","10":"Быстрина","11":"Удар героя","12":"Звездный огонь","13":"Атака языка пламени","14":"Нестабильное колдовство","15":"Ожог души"}'
           - name: Players_Classes
             value: '{"0":"0,1,21,23","1":"2,3,12","2":"4","3":"5,6,19","4":"7,8","5":"9,22"}'
           - name: Players_Bosses
             value: '{"0":"Халион","1":"Лорд Ребрад","2":"Леди Смертный Шепот","3":"Битва на кораблях в Ледяной Короне","4":"Саурфанг","5":"Тухлопуз","6":"Гниломорд","7":"Профессор","8":"Кровавый Совет","9":"Королева Ланатель","10":"Валитрия Сноходица","11":"Синдрагоса","12":"Король-лич"}'